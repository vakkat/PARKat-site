<!doctype html>
<html lang="el">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PARKat • Download</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

<header>
  <div class="nav">
    <a class="brand" href="index.html">
      <img src="./PARKat.png" alt="PARKat logo" class="logo">
      <span>PARKat</span>
    </a>

    <div class="navlinks">
      <a href="index.html" data-i18n="nav_home"></a>
      <a class="active" href="download.html" data-i18n="nav_download"></a>
      <a href="guide.html" data-i18n="nav_guide"></a>
      <a href="privacy.html" data-i18n="nav_privacy"></a>
    </div>

    <div class="controls">
      <span class="pill"><span data-i18n="pill_research"></span></span>
      <button class="btn" id="langToggle" type="button">EN</button>
    </div>
  </div>
</header>

<main>

  <div class="hero">
    <h1 data-i18n="download_title"></h1>
    <p class="subtitle" data-i18n="download_subtitle"></p>
  </div>

  <div class="grid">

    <!-- INSTALL APP -->
    <div class="card">
      <h2 data-i18n="download_step1_title"></h2>
      <p data-i18n="download_step1_text"></p>

      <div class="storeBadgeWrap">
        <a
          class="storeBadgeLink"
          href="https://play.google.com/store/apps/details?id=gr.ntua.parkat_app"
          target="_blank"
          rel="noopener"
          aria-label="Google Play"
        >
          <img
            src="./GetItOnGooglePlay_Badge_Web_color_Greek.svg"
            alt="Λήψη από το Google Play"
            class="storeBadge badge-el"
          >
          <img
            src="./GetItOnGooglePlay_Badge_Web_color_English.svg"
            alt="Get it on Google Play"
            class="storeBadge badge-en"
          >
        </a>

        <p class="storeNote" data-i18n="download_badge_note"></p>
      </div>
    </div>

    <!-- BEFORE START -->
    <div class="card">
      <h2 data-i18n="download_step2_title"></h2>
      <ol class="steps">
        <li data-i18n="download_step2_a"></li>
        <li data-i18n="download_step2_b"></li>
        <li data-i18n="download_step2_c"></li>
      </ol>
    </div>

    <!-- DURING USE -->
    <div class="card">
      <h2 data-i18n="download_step3_title"></h2>
      <ol class="steps">
        <li data-i18n="download_step3_a"></li>
        <li data-i18n="download_step3_b"></li>
        <li data-i18n="download_step3_c"></li>
        <li data-i18n="download_step3_d"></li>
      </ol>
    </div>

    <!-- NOTE -->
    <div class="card">
      <h2 data-i18n="download_note_title"></h2>
      <p data-i18n="download_note_text"></p>
    </div>

    <!-- CONTACT FOR TESTERS -->
    <div class="card small">
      <h2 data-i18n="download_contact_title"></h2>
      <p data-i18n="download_contact_text"></p>
      <p style="margin-top:8px;">
        📧 <a href="mailto:kvakrinou@mail.ntua.gr">kvakrinou@mail.ntua.gr</a>
      </p>
    </div>

  </div>

</main>

<footer>
  <div class="footerInner">
    <span data-i18n="footer_left"></span>
    <span>
      <a href="privacy.html" data-i18n="footer_privacy"></a>
    </span>
  </div>
</footer>

<script src="download-i18n.js?v=4"></script>
<script src="app.js?v=2"></script>

</body>
</html>
